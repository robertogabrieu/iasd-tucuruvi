services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - UPLOADS_DIR=/app/uploads
      # PUBLIC_BASE_URL (Open Graph do boletim) vem do .env.local via env_file.
      # Não redeclarar aqui: `environment` tem precedência e sobrescreveria com vazio.
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file:
      - .env.local
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapa o $ para o shell do container (usa as envs do próprio Postgres)
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
